<head>
  <meta charset="UTF-8">

  <title>Decision Making Skeleton</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }

    .toolbar {
      background: #13161f;
      border-bottom: 1px solid #252a3a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar span {
      color: #4a5568;
      font-size: 13px;
      margin-right: auto;
    }

    .toolbar-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    a.nav-btn {
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    button, a.nav-btn {
      background: #1a1d2c;
      color: #8892a4;
      border: 1px solid #252a3a;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover, a.nav-btn:hover {
      background: #252a3a;
      color: #dde3ed;
    }

    .viewport {
      flex: 1;
      overflow: hidden;
      cursor: grab;
      position: relative;
    }

    .viewport:active { cursor: grabbing; }

    .canvas {
      position: absolute;
      transform-origin: 0 0;
      will-change: transform;
    }

    .canvas img,
    .canvas svg {
      display: block;
      max-width: none;
    }

    .hint {
      position: fixed;
      bottom: 16px;
      right: 20px;
      color: #252a3a;
      font-size: 11px;
      font-family: monospace;
      pointer-events: none;
    }
  </style>
</head>

rt" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Standard build order chunks in sequence:  production = [den / rax / workshop] The idea of this is to help simplify</text><text x="0" y="27.9068359375" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="13px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">gameplans across openings / playstyles so they arc back to a common theme this is just how I usually play it doesnt mean</text><text x="0" y="43.5068359375" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="13px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">its the best or whatever but it gives me something to point to if asked a question.</text></g><g stroke-opacity="0.7" fill-opacity="0.7" transform="translate(10.000000000000114 116.81009252687997) rotate(0 393.75 7.200000000000003)"><text x="0" y="11.36015625" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Macro normally between chunks (units / workers / houses) unless stated otherwise in a more detailed build guide.</text></g><g stroke-opacity="0.7" fill-opacity="0.7" transform="translate(10.000000000000114 133.81009252687997) rotate(0 386.71875 7.200000000000003)"><text x="0" y="11.36015625" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">It's also common to cut workers briefly at certain stages if you need to get to the next step quicker (usually</text></g><g stroke-opacity="0.7" fill-opacity="0.7" transform="translate(10.000000000000114 150.81009252687997) rotate(0 351.5625 7.200000000000003)"><text x="0" y="11.36015625" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">safety concerns) — but this can ripple somewhat and slow you down from reaching the step after that.</text></g><g stroke-opacity="0.7" fill-opacity="0.7" transform="translate(10.000000000000114 167.81009252687997) rotate(0 459 43.199999999999996)"><text x="0" y="11.36015625" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">Producing workers is really expensive — roughly 1/4th of what a base is earning while you're still building them. When you hit</text><text x="0" y="25.76015625" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">saturation and stop making workers that cost just goes away, and you'll notice a real spike in your spendable income. Your mines</text><text x="0" y="40.16015625" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">are still pulling the same; you just aren't sinking a quarter of it back into the next worker anymore.</text><text x="0" y="54.560156250000006" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">If you cut workers before saturation you'll feel that bump sooner, but the earlier you stop investing in workers the less you're</text><text x="0" y="68.96015625" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">leaving yourself with later. Understanding when and why there will be a spike in funds will help us time transitions into more</text><text x="0" y="83.36015625" font-family="Cascadia, monospace, Segoe UI Emoji" font-size="12px" fill="#8892a4" text-anchor="start" style="white-space: pre;" direction="ltr" dominant-baseline="alphabetic">production or tech/upgrades etc.</text></g><g stroke-linecap="round" transform="translate(10.000000000000114 260.81009252688) rotate(0 750 0.5)"><path d="M0 0 C329.98 0, 659.95 0, 1500 0 C1500 0, 1500 0, 1500 0 C1500 0.33, 1500 0.65, 1500 1 C1500 1, 1500 1, 1500 1 C996.87 1, 493.73 1, 0 1 C0 1, 0 1, 0 1 C0 0.76, 0 0.51, 0 0 C0 0, 0 0, 0 0" stroke="none" stroke-width="0" fill="#252a3a"></path><path d="M0 0 C300.01 0, 600.01 0, 1500 0 M0 0 C407.99 0, 815.98 0, 1500 0 M1500 0 C1500 0, 1500 0, 1500 0 M1500 0 C1500 0, 1500 0, 1500 0 M1500 0 C1500 0.22, 1500 0.44, 1500 1 M1500 0 C1500 0.39, 1500 0.78, 1500 1 M1500 1 C1500 1, 1500 1, 1500 1 M1500 1 C1500 1, 1500 1, 1500 1 M1500 1 C1176.49 1, 852.98 1, 0 1 M1500 1 C1176.27 1, 852.54 1, 0 1 M0 1 C0 1, 0 1, 0 1 M0 1 C0 1, 0 1, 0 1 M0 1 C0 0.71, 0 0.43, 0 0 M0 1 C0 0.72, 0 0.45, 0 0 M0 0 C0 0, 0 0, 0 0 M0 0 C0 0, 0 0, 0 0" stroke="#252a3a" stroke-width="2" fill="none"></path></g><g stroke-linecap="round" transform="translate(10.000000000000114 317.81009252688) rotate(0 750 3)"><path d="M1.5 0 C330.82 0, 660.13 0, 1498.5 0 C1499.5 0, 1500 0.5, 1500 1.5 C1500 2.48, 1500 3.45, 1500 4.5 C1500 5.5, 1499.5 6, 1498.5 6 C996.37 6, 494.25 6, 1.5 6 C0.5 6, 0 5.5, 0 4.5 C0 3.77, 0 3.04, 0 1.5 C0 0.5, 0.5 0, 1.5 0" stroke="none" stroke-width="0" fill="#1a1f2e"></path><path d="M1.5 0 C300.91 0, 600.31 0, 1498.5 0 M1.5 0 C408.67 0, 815.85 0, 1498.5 0 M1498.5 0 C1499.5 0, 1500 0.5, 1500 1.5 M1498.5 0 C1499.5 0, 1500 0.5, 1500 1.5 M1500 1.5 C1500 2.15, 1500 2.81, 1500 4.5 M1500 1.5 C1500 2.67, 1500 3.84, 1500 4.5 M1500 4.5 C1500 5.5, 1499.5 6, 1498.5 6 M1500 4.5 C1500 5.5, 1499.5 6, 1498.5 6 M1498.5 6 C1175.64 6, 852.78 6, 1.5 6 M1498.5 6 C1175.42 6, 852.33 6, 1.5 6 M1.5 6 C0.5 6, 0 5.5, 0 4.5 M1.5 6 C0.5 6, 0 5.5, 0 4.5 M0 <div class="hint">scroll to zoom · drag to pan</div>

<script>
  const HOME_URL = 'https://brandanmahaffey.github.io/LWG-Guides/';

  function goBack() {
    if (window.history.length > 1) {
      history.back();
    } else {
      window.location.href = HOME_URL;
    }
  }

  const viewport = document.getElementById('viewport');
  const canvas = document.getElementById('canvas');
  const img = document.getElementById('img');

  function graphicSize(el) {
    if (el.tagName.toLowerCase() === 'svg') {
      const vb = el.viewBox.baseVal
      if (vb && vb.width > 0) return { w: vb.width, h: vb.height }
      return {
        w: parseFloat(el.getAttribute("width")),
        h: parseFloat(el.getAttribute("height")),
      }
    }
    return { w: el.naturalWidth, h: el.naturalHeight }
  }

  let scale = 1;
  let offsetX = 0;
  let offsetY = 0;
  let isDragging = false;
  let startX, startY, startOffsetX, startOffsetY;

  function applyTransform() {
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  }

  function fitToScreen() {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const { w: iw, h: ih } = graphicSize(img);
    if (vw < 1 || vh < 1 || iw < 1 || ih < 1) return;
    scale = Math.min(vw / iw, vh / ih) * 0.95;
    offsetX = (vw - iw * scale) / 2;
    offsetY = (vh - ih * scale) / 2;
    applyTransform();
  }

  function zoomIn() {
    const cx = viewport.clientWidth / 2;
    const cy = viewport.clientHeight / 2;
    zoomAt(cx, cy, 1.25);
  }

  function zoomOut() {
    const cx = viewport.clientWidth / 2;
    const cy = viewport.clientHeight / 2;
    zoomAt(cx, cy, 0.8);
  }

  function resetZoom() {
    scale = 1;
    offsetX = (viewport.clientWidth - graphicSize(img).w) / 2;
    offsetY = (viewport.clientHeight - graphicSize(img).h) / 2;
    applyTransform();
  }

  function zoomAt(cx, cy, factor) {
    const newScale = Math.min(Math.max(scale * factor, 0.1), 8);
    offsetX = cx - (cx - offsetX) * (newScale / scale);
    offsetY = cy - (cy - offsetY) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }

  // Scroll to zoom
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    zoomAt(cx, cy, factor);
  }, { passive: false });

  // Drag to pan
  viewport.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startOffsetX = offsetX;
    startOffsetY = offsetY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    offsetX = startOffsetX + (e.clientX - startX);
    offsetY = startOffsetY + (e.clientY - startY);
    applyTransform();
  });

  window.addEventListener('mouseup', () => { isDragging = false; });

  // Touch support
  let lastTouchDist = null;
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startOffsetX = offsetX;
      startOffsetY = offsetY;
    }
  });

  viewport.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (lastTouchDist) {
        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        zoomAt(cx, cy, dist / lastTouchDist);
      }
      lastTouchDist = dist;
    } else if (e.touches.length === 1 && isDragging) {
      offsetX = startOffsetX + (e.touches[0].clientX - startX);
      offsetY = startOffsetY + (e.touches[0].clientY - startY);
      applyTransform();
    }
  }, { passive: false });

  viewport.addEventListener('touchend', () => {
    isDragging = false;
    lastTouchDist = null;
  });

  function scheduleFitToScreen() {
    requestAnimationFrame(() => {
      if (viewport.clientWidth < 1 || viewport.clientHeight < 1) return;
      fitToScreen();
    });
  }

  function initViewer() {
    const ready = () => {
      fitToScreen();
      requestAnimationFrame(fitToScreen);
    };
    if (img.tagName.toLowerCase() === 'svg') {
      ready();
    } else {
      img.onload = ready;
      if (img.complete) ready();
    }
  }

  initViewer();
  window.addEventListener('resize', scheduleFitToScreen);
  window.addEventListener('load', scheduleFitToScreen);
  window.addEventListener('pageshow', (e) => {
    if (e.persisted) scheduleFitToScreen();
  });
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(scheduleFitToScreen).observe(viewport);
  }
</script>
