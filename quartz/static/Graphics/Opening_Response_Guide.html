<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cheese Scouting Response Guide</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      font-family: monospace;
    }

    .toolbar {
      background: #13161f;
      border-bottom: 1px solid #252a3a;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar span {
      color: #4a5568;
      font-size: 13px;
      margin-right: auto;
    }

    button {
      background: #1a1d2c;
      color: #8892a4;
      border: 1px solid #252a3a;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.15s;
    }

    button:hover {
      background: #252a3a;
      color: #dde3ed;
    }

    .viewport {
      flex: 1;
      overflow: hidden;
      cursor: grab;
      position: relative;
    }

    .viewport:active { cursor: grabbing; }

    .canvas {
      position: absolute;
      transform-origin: 0 0;
      will-change: transform;
    }

    .canvas img {
      display: block;
      max-width: none;
    }

    .hint {
      position: fixed;
      bottom: 16px;
      right: 20px;
      color: #252a3a;
      font-size: 11px;
      font-family: monospace;
      pointer-events: none;
    }
  </style>
</head>

<div class="hint">scroll to zoom · drag to pan</div>

<script>
  const viewport = document.getElementById('viewport');
  const canvas = document.getElementById('canvas');
  const img = document.getElementById('img');

  function graphicSize(el) {
    if (el.tagName.toLowerCase() === 'svg') {
      const vb = el.viewBox.baseVal
      if (vb && vb.width > 0) return { w: vb.width, h: vb.height }
      return {
        w: parseFloat(el.getAttribute("width")),
        h: parseFloat(el.getAttribute("height")),
      }
    }
    return { w: el.naturalWidth, h: el.naturalHeight }
  }

  let scale = 1;
  let offsetX = 0;
  let offsetY = 0;
  let isDragging = false;
  let startX, startY, startOffsetX, startOffsetY;

  function applyTransform() {
    canvas.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${scale})`;
  }

  function fitToScreen() {
    const vw = viewport.clientWidth;
    const vh = viewport.clientHeight;
    const { w: iw, h: ih } = graphicSize(img);
    scale = Math.min(vw / iw, vh / ih) * 0.95;
    offsetX = (vw - iw * scale) / 2;
    offsetY = (vh - ih * scale) / 2;
    applyTransform();
  }

  function zoomIn() {
    const cx = viewport.clientWidth / 2;
    const cy = viewport.clientHeight / 2;
    zoomAt(cx, cy, 1.25);
  }

  function zoomOut() {
    const cx = viewport.clientWidth / 2;
    const cy = viewport.clientHeight / 2;
    zoomAt(cx, cy, 0.8);
  }

  function resetZoom() {
    scale = 1;
    offsetX = (viewport.clientWidth - graphicSize(img).w) / 2;
    offsetY = (viewport.clientHeight - graphicSize(img).h) / 2;
    applyTransform();
  }

  function zoomAt(cx, cy, factor) {
    const newScale = Math.min(Math.max(scale * factor, 0.1), 8);
    offsetX = cx - (cx - offsetX) * (newScale / scale);
    offsetY = cy - (cy - offsetY) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }

  // Scroll to zoom
  viewport.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const cx = e.clientX - rect.left;
    const cy = e.clientY - rect.top;
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    zoomAt(cx, cy, factor);
  }, { passive: false });

  // Drag to pan
  viewport.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startOffsetX = offsetX;
    startOffsetY = offsetY;
  });

  window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    offsetX = startOffsetX + (e.clientX - startX);
    offsetY = startOffsetY + (e.clientY - startY);
    applyTransform();
  });

  window.addEventListener('mouseup', () => { isDragging = false; });

  // Touch support
  let lastTouchDist = null;
  viewport.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      startOffsetX = offsetX;
      startOffsetY = offsetY;
    }
  });

  viewport.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (lastTouchDist) {
        const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        zoomAt(cx, cy, dist / lastTouchDist);
      }
      lastTouchDist = dist;
    } else if (e.touches.length === 1 && isDragging) {
      offsetX = startOffsetX + (e.touches[0].clientX - startX);
      offsetY = startOffsetY + (e.touches[0].clientY - startY);
      applyTransform();
    }
  }, { passive: false });

  viewport.addEventListener('touchend', () => {
    isDragging = false;
    lastTouchDist = null;
  });

  // Init — fit to screen once graphic is ready
  if (img.tagName.toLowerCase() === 'svg') {
    fitToScreen();
  } else {
    img.onload = fitToScreen;
    if (img.complete) fitToScreen();
  }
</script>
